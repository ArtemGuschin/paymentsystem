spring:
  application:
    name: fake-payment-provider

  datasource:
    url: jdbc:postgresql://localhost:5432/fake_provider
    username: postgres
    password: postgres
    hikari:
      initializationFailTimeout: 60000

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: 8888


logging:
  level:
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG


dataSources:
  ds_0:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: org.postgresql.Driver
    jdbcUrl: jdbc:postgresql://localhost:5432/transaction_db_0
    username: postgres
    password: postgres

  ds_1:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: org.postgresql.Driver
    jdbcUrl: jdbc:postgresql://localhost:5432/transaction_db_1
    username: postgres
    password: postgres


rules:
  # -------------------------
  # 1. НЕШАРДИРОВАННЫЕ ТАБЛИЦЫ
  # -------------------------
  - !SINGLE
    tables:
      - ds_0.wallet_types
      - ds_1.wallet_types


  # -------------------------
  # 2. SHARDING
  # -------------------------
  - !SHARDING

    tables:

      # -------- wallets --------
      wallets:
        actualDataNodes: ds_${0..1}.wallets
        databaseStrategy:
          standard:
            shardingColumn: user_uid
            shardingAlgorithmName: user-sharding
        tableStrategy:
          none: {}


      # -------- transactions --------
      transactions:
        actualDataNodes: ds_${0..1}.transactions
        databaseStrategy:
          standard:
            shardingColumn: user_uid
            shardingAlgorithmName: user-sharding
        tableStrategy:
          none: {}


      # -------- payment_requests --------
      payment_requests:
        actualDataNodes: ds_${0..1}.payment_requests
        databaseStrategy:
          standard:
            shardingColumn: user_uid
            shardingAlgorithmName: user-sharding
        tableStrategy:
          none: {}


      # -------- top_up_requests --------
      top_up_requests:
        actualDataNodes: ds_${0..1}.top_up_requests
        databaseStrategy:
          standard:
            shardingColumn: user_uid
            shardingAlgorithmName: user-sharding
        tableStrategy:
          none: {}


      # -------- withdrawal_requests --------
      withdrawal_requests:
        actualDataNodes: ds_${0..1}.withdrawal_requests
        databaseStrategy:
          standard:
            shardingColumn: user_uid
            shardingAlgorithmName: user-sharding
        tableStrategy:
          none: {}


      # -------- transfer_requests --------
      transfer_requests:
        actualDataNodes: ds_${0..1}.transfer_requests
        databaseStrategy:
          standard:
            shardingColumn: user_uid
            shardingAlgorithmName: user-sharding
        tableStrategy:
          none: {}


    # -------------------------
    # 3. ALGORITHMS
    # -------------------------
    shardingAlgorithms:

      user-sharding:
        type: INLINE
        props:
          algorithm-expression: ds_${Math.abs(user_uid.hashCode()) % 2}


props:
  sql-show: true





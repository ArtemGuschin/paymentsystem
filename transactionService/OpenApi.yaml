openapi: 3.0.0
info:
  title: Transaction Service API
  version: 1.1.1
servers:
  - url: http://localhost:8082/api/v1

paths:
  # Transactions
  /transactions/deposit/init:
    post:
      summary: Инициализация депозита
      tags:
        - Transactions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepositInitRequest'
      responses:
        '200':
          description: Условия депозита
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionInitResponse'
        '400':
          description: Ошибка валидации
        '402':
          description: Недостаточно средств
        '404':
          description: Кошелек не найден

  /transactions/deposit/confirm:
    post:
      summary: Подтверждение депозита
      tags:
        - Transactions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepositConfirmRequest'
      responses:
        '202':
          description: Депозит принят в обработку
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionAsyncResponse'
        '400':
          description: Ошибка валидации
        '409':
          description: Конфликт (идемпотентность)

  /transactions/withdrawal/init:
    post:
      summary: Инициализация вывода средств
      tags:
        - Transactions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithdrawalInitRequest'
      responses:
        '200':
          description: Условия вывода
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionInitResponse'
        '400':
          description: Ошибка валидации
        '402':
          description: Недостаточно средств

  /transactions/withdrawal/confirm:
    post:
      summary: Подтверждение вывода средств
      tags:
        - Transactions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithdrawalConfirmRequest'
      responses:
        '202':
          description: Вывод принят в обработку
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionAsyncResponse'
        '400':
          description: Ошибка валидации
        '402':
          description: Недостаточно средств

  /transactions/transfer/init:
    post:
      summary: Инициализация перевода
      tags:
        - Transactions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferInitRequest'
      responses:
        '200':
          description: Условия перевода
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionInitResponse'
        '400':
          description: Ошибка валидации
        '402':
          description: Недостаточно средств
        '404':
          description: Кошелек отправителя или получателя не найден

  /transactions/transfer/confirm:
    post:
      summary: Подтверждение перевода (синхронный)
      tags:
        - Transactions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferConfirmRequest'
      responses:
        '200':
          description: Перевод выполнен успешно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionSyncResponse'
        '400':
          description: Ошибка валидации
        '402':
          description: Недостаточно средств

  /transactions/{transactionId}:
    get:
      summary: Получение статуса транзакции
      tags:
        - Transactions
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Статус и детали транзакции
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionStatusResponse'
        '404':
          description: Транзакция не найдена

  /transactions:
    get:
      summary: Поиск транзакций по фильтрам с пагинацией
      tags:
        - Transactions
      parameters:
        - in: query
          name: userUid
          schema:
            type: string
            format: uuid
        - in: query
          name: walletUid
          schema:
            type: string
            format: uuid
        - in: query
          name: type
          schema:
            type: string
            enum: [DEPOSIT, WITHDRAWAL, TRANSFER]
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, COMPLETED, FAILED, CANCELLED]
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date-time
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
        - in: query
          name: page
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Список транзакций
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionListResponse'

components:
  schemas:
    # Request Schemas
    DepositInitRequest:
      type: object
      required:
        - userUid
        - walletUid
        - amount
      properties:
        userUid:
          type: string
          format: uuid
          description: ID пользователя
        walletUid:
          type: string
          format: uuid
          description: ID кошелька для пополнения
        amount:
          type: number
          minimum: 0.01
          description: Сумма пополнения

    DepositConfirmRequest:
      type: object
      required:
        - userUid
        - walletUid
        - amount
        - idempotencyKey
      properties:
        userUid:
          type: string
          format: uuid
        walletUid:
          type: string
          format: uuid
        amount:
          type: number
          minimum: 0.01
        idempotencyKey:
          type: string
          description: Ключ идемпотентности
        paymentMethodId:
          type: string
          description: ID способа оплаты

    WithdrawalInitRequest:
      type: object
      required:
        - userUid
        - walletUid
        - amount
      properties:
        userUid:
          type: string
          format: uuid
        walletUid:
          type: string
          format: uuid
        amount:
          type: number
          minimum: 0.01

    WithdrawalConfirmRequest:
      type: object
      required:
        - userUid
        - walletUid
        - amount
        - idempotencyKey
      properties:
        userUid:
          type: string
          format: uuid
        walletUid:
          type: string
          format: uuid
        amount:
          type: number
          minimum: 0.01
        idempotencyKey:
          type: string
        paymentMethodId:
          type: string

    TransferInitRequest:
      type: object
      required:
        - userUid
        - fromWalletUid
        - toWalletUid
        - amount
      properties:
        userUid:
          type: string
          format: uuid
        fromWalletUid:
          type: string
          format: uuid
        toWalletUid:
          type: string
          format: uuid
        amount:
          type: number
          minimum: 0.01

    TransferConfirmRequest:
      type: object
      required:
        - userUid
        - fromWalletUid
        - toWalletUid
        - amount
        - idempotencyKey
      properties:
        userUid:
          type: string
          format: uuid
        fromWalletUid:
          type: string
          format: uuid
        toWalletUid:
          type: string
          format: uuid
        amount:
          type: number
          minimum: 0.01
        idempotencyKey:
          type: string

    # Response Schemas
    TransactionInitResponse:
      type: object
      properties:
        fee:
          type: number
          description: Комиссия за операцию
        totalAmount:
          type: number
          description: Общая сумма к списанию/зачислению
        available:
          type: boolean
          description: Доступна ли операция
        limits:
          type: object
          properties:
            minAmount:
              type: number
            maxAmount:
              type: number
            dailyLimit:
              type: number

    TransactionAsyncResponse:
      type: object
      required:
        - transactionId
        - status
      properties:
        transactionId:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING]
          description: Для асинхронных операций всегда PENDING
        message:
          type: string
          description: Дополнительное сообщение

    TransactionSyncResponse:
      type: object
      required:
        - transactionId
        - status
      properties:
        transactionId:
          type: string
          format: uuid
        status:
          type: string
          enum: [COMPLETED, FAILED]
          description: Для синхронных операций конечный статус
        message:
          type: string
          description: Дополнительное сообщение

    TransactionStatusResponse:
      type: object
      properties:
        uid:
          type: string
          format: uuid
        userUid:
          type: string
          format: uuid
        walletUid:
          type: string
          format: uuid
        amount:
          type: number
        type:
          type: string
          enum: [DEPOSIT, WITHDRAWAL, TRANSFER]
        status:
          type: string
          enum: [PENDING, COMPLETED, FAILED, CANCELLED]
        fee:
          type: number
        targetWalletUid:
          type: string
          format: uuid
        failureReason:
          type: string
        created_at:
          type: string
          format: date-time
        modified_at:
          type: string
          format: date-time

    TransactionListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/TransactionStatusResponse'
        totalElements:
          type: integer
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        code:
          type: string
        details:
          type: object